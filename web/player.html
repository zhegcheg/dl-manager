<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DL Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
    .nav { width: 100%; padding: 12px 20px; background: #111; display: flex; align-items: center; gap: 12px; }
    .nav a { color: #ff6b9d; text-decoration: none; font-size: 14px; }
    .nav a:hover { text-decoration: underline; }
    .nav .title { color: #aaa; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    video { max-width: 100%; max-height: calc(100vh - 52px); }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">← DL Manager</a>
    <span class="title" id="filename"></span>
  </div>
  <video id="player" controls autoplay></video>
  <script>
    const params = new URLSearchParams(location.search)
    const file = params.get('file')
    if (file) {
      document.getElementById('filename').textContent = decodeURIComponent(file)
      document.getElementById('player').src = '/api/media/' + encodeURIComponent(file)
    }
  </script>
</body>
</html>
