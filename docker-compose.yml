version: "3.8"

services:
  dl-manager:
    build: .
    container_name: dl-manager
    restart: always
    network_mode: "host"
    volumes:
      # 下载目录（持久化）
      - /home/zhegcheg/imovie/tasks:/app/tasks
      # 数据库和日志（持久化）
      - /home/zhegcheg/.dl-manager:/root/.dl-manager
      # NAS 挂载点（从宿主机传入容器）
      - /mnt/fn-nas-imovie:/mnt/fn-nas-imovie
    environment:
      - TZ=Asia/Shanghai
      - PORT=8899
      # 容器内路径（环境变量优先于 DB 默认值）
      - DOWNLOAD_DIR=/app/tasks
      - TEMP_DIR=/app/tasks/temp
      - NAS_MEDIA_DIR=/mnt/fn-nas-imovie
