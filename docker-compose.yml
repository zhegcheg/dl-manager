version: "3.8"

services:
  dl-manager:
    build: .
    container_name: dl-manager
    restart: always
    network_mode: "host"
    volumes:
      # 下载目录（持久化）
      - /home/zhegcheg/imovie/tasks:/app/tasks
      # 数据库和日志（持久化）
      - /home/zhegcheg/.jable-dl-server:/root/.jable-dl-server
      # NAS 挂载点（从宿主机传入容器）
      - /mnt/fn-nas-imovie:/mnt/fn-nas-imovie
    environment:
      - TZ=Asia/Shanghai
